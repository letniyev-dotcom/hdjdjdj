name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

# Cancel an older run of this workflow on the same ref when a new push lands.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# contents: write is required so the build can publish a GitHub Release with
# the signed APK attached.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Release only — signed with the in-repo letify-release.jks (signing
      # config lives in app/build.gradle.kts), so the output installs directly
      # on a device without any extra steps.
      - name: Build Release APK (signed)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: letify-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # On every push to the default branch, publish the signed release APK as
      # a downloadable GitHub Release (one click from the Releases tab). Uses
      # the built-in GITHUB_TOKEN automatically.
      - name: Publish GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Letify build ${{ github.run_number }}
          body: |
            Automated build from ${{ github.sha }}.
            Signed release APK attached below — download and install directly.
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
